<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SSC Batch 2022 - Iftar Mahfil</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* HEADER */

header{
position:relative;
padding:220px 20px 100px;
text-align:center;
background:url("header.jpg") center/cover no-repeat;
}

header::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
}

header *{
position:relative;
z-index:2;
}

.admin-icon{
position:absolute;
top:15px;
right:15px;
background:rgba(255,255,255,0.15);
padding:8px 12px;
border-radius:50%;
cursor:pointer;
}

/* CARD */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
margin:15px;
padding:20px;
border-radius:15px;
}

/* INPUT */

input,select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
}

/* BUTTON */

button{
padding:10px 15px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* PROGRESS */

.progress{
background:#333;
border-radius:20px;
overflow:hidden;
}

.progress-bar{
height:18px;
background:gold;
width:0%;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td,th{
padding:6px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.notice{
color:gold;
font-size:13px;
margin-top:8px;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#000;
color:#ccc;
margin-top:30px;
}

footer a{
color:gold;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<div class="admin-icon" onclick="toggleAdmin()">⚙️</div>

<h2>SSC Batch 2022</h2>
<h3>Iftar Mahfil Fund Collection</h3>

<div>🌙 ইফতার শুরু হতে বাকি</div>
<div id="countdown"></div>

<h3>Total: <span id="total">0</span> ৳</h3>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

</header>

<div id="adminPanel" style="display:none;text-align:center;padding:10px;">

<input type="password" id="adminPass" placeholder="Admin Password">

<button onclick="loginAdmin()">Login</button>

<button onclick="logoutAdmin()">Logout</button>

</div>

<div class="card">

<h3>📱 Payment Methods</h3>

bKash / Nagad / Rocket

<br><br>

<b>Number:</b>

<span id="paymentNumber">01717162586</span>

<button onclick="copyNumber()">Copy</button>

<div class="notice">

Send money only ✅ With Cashout Charge

</div>

</div>

<div class="card">

<input type="text" id="name" placeholder="আপনার নাম">

<input type="number" id="amount" placeholder="কত টাকা দিচ্ছেন">

<select id="method">

<option value="">Select Method</option>

<option>bKash</option>

<option>Nagad</option>

<option>Rocket</option>

</select>

<input type="text" id="trx" placeholder="Transaction ID">

<button onclick="addDonation()">Submit</button>

</div>

<div class="card">

<h3>📋 Donor List</h3>

<table>

<thead>

<tr>

<th>নাম</th>

<th>৳</th>

<th>Method</th>

<th>TRX ID</th>

<th>Admin</th>

</tr>

</thead>

<tbody id="donorList"></tbody>

</table>

</div>

<footer>

Developed by 

<a href="https://www.facebook.com/CrazySaiful91" target="_blank">

Saiful

</a>

</footer>

<script>

const firebaseConfig = {

apiKey: "AIzaSyBTt6NgG9ln6JPMBizzZLSXAUeie1JoUjE",

authDomain: "ssc-ifter-22-batch.firebaseapp.com",

projectId: "ssc-ifter-22-batch"

};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

let isAdmin=false;

function toggleAdmin(){

const panel=document.getElementById("adminPanel");

panel.style.display=panel.style.display==="block"?"none":"block";

}

function loginAdmin(){

if(document.getElementById("adminPass").value==="ssc2022batch"){

isAdmin=true;

alert("Admin Mode ON");

loadData();

}

}

function logoutAdmin(){

isAdmin=false;

alert("Logged Out");

loadData();

}

function copyNumber(){

navigator.clipboard.writeText(document.getElementById("paymentNumber").innerText);

alert("Number Copied");

}

function addDonation(){

const name=document.getElementById("name").value;

const amount=document.getElementById("amount").value;

const method=document.getElementById("method").value;

const trx=document.getElementById("trx").value;

if(!name||!amount||!method||!trx){

alert("সব তথ্য পূরণ করুন");

return;

}

db.collection("donations").add({

name,

amount:parseInt(amount),

method,

trx

});

}

function loadData(){

db.collection("donations").onSnapshot(snapshot=>{

const donorList=document.getElementById("donorList");

donorList.innerHTML="";

let total=0;

snapshot.forEach(doc=>{

const data=doc.data();

total+=data.amount;

const row=donorList.insertRow();

row.insertCell(0).innerText=data.name;

row.insertCell(1).innerText=data.amount;

row.insertCell(2).innerText=data.method;

row.insertCell(3).innerText=data.trx;

if(isAdmin){

row.insertCell(4).innerHTML=

`<button onclick="deleteDonation('${doc.id}')">❌</button>`;

}else{

row.insertCell(4).innerText="-";

}

});

document.getElementById("total").innerText=total;

document.getElementById("progressBar").style.width=(total/30000*100)+"%";

});

}

function deleteDonation(id){

db.collection("donations").doc(id).delete();

}

loadData();

/* COUNTDOWN */

const eventDate=new Date("March 19 2026 17:30:00").getTime();

setInterval(()=>{

const now=new Date().getTime();

const distance=eventDate-now;

if(distance<=0){

document.getElementById("countdown").innerHTML="ইফতার শুরু হয়েছে";

return;

}

const d=Math.floor(distance/(1000*60*60*24));

const h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

const m=Math.floor((distance%(1000*60*60))/(1000*60));

const s=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=

`${d} দিন ${h} ঘন্টা ${m} মিনিট ${s} সেকেন্ড`;

},1000);

</script>

</body>
</html>
